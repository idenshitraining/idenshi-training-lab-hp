<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>テスト太郎 | AI エンジニア</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent: #7c3aed;
      --accent2: #06b6d4;
      --bg: #e9e6f7;
      --surface: #f3f0ff;
      --text: #1e1b4b;
      --muted: #4c3d8f;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 18px;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      overflow-x: hidden;
    }

    /* animated background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 20% 20%, rgba(124,58,237,.18) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 80% 80%, rgba(6,182,212,.15) 0%, transparent 60%);
      z-index: 0;
      pointer-events: none;
    }

    .card {
      position: relative;
      z-index: 1;
      background: rgba(255,255,255,.75);
      border: 1px solid rgba(124,58,237,.25);
      border-radius: 2rem;
      padding: 3rem 3.5rem;
      max-width: 560px;
      width: 100%;
      backdrop-filter: blur(16px);
      box-shadow: 0 0 60px rgba(124,58,237,.1), 0 25px 50px rgba(124,58,237,.12);
    }

    .avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      margin: 0 auto 1.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.8rem;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      box-shadow: 0 0 30px rgba(124,58,237,.5);
    }

    .name {
      font-size: 2.4rem;
      font-weight: 700;
      text-align: center;
      background: linear-gradient(135deg, var(--accent) 30%, var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: .02em;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: .5rem;
      margin: .8rem auto 0;
      padding: .35rem 1rem;
      border-radius: 999px;
      background: linear-gradient(135deg, rgba(124,58,237,.25), rgba(6,182,212,.2));
      border: 1px solid rgba(124,58,237,.4);
      font-size: .9rem;
      color: var(--accent2);
      font-weight: 600;
      letter-spacing: .04em;
      text-transform: uppercase;
    }

    .badge::before { content: '⚡'; }

    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(124,58,237,.5), transparent);
      margin: 2rem 0;
    }

    .bio {
      color: var(--muted);
      line-height: 1.8;
      font-size: .98rem;
      text-align: center;
    }

    .skills {
      display: flex;
      flex-wrap: wrap;
      gap: .6rem;
      justify-content: center;
      margin-top: 1.8rem;
    }

    .skill {
      padding: .3rem .9rem;
      border-radius: .5rem;
      background: rgba(124,58,237,.08);
      border: 1px solid rgba(124,58,237,.2);
      font-size: .9rem;
      color: var(--accent);
      transition: all .2s;
    }

    .skill:hover {
      background: rgba(124,58,237,.25);
      border-color: var(--accent);
      color: #fff;
      transform: translateY(-2px);
    }

    .links {
      display: flex;
      gap: 1rem;
      justify-content: center;
      margin-top: 2rem;
    }

    .link-btn {
      padding: .65rem 1.6rem;
      border-radius: .75rem;
      font-size: .9rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: all .2s;
    }

    .link-btn.primary {
      background: linear-gradient(135deg, var(--accent), #5b21b6);
      color: #fff;
      border: none;
      box-shadow: 0 4px 20px rgba(124,58,237,.4);
    }

    .link-btn.primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(124,58,237,.55);
    }

    .link-btn.secondary {
      background: transparent;
      color: var(--muted);
      border: 1px solid rgba(255,255,255,.15);
    }

    .link-btn.secondary:hover {
      border-color: var(--accent2);
      color: var(--accent2);
      transform: translateY(-2px);
    }

    .status {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: .5rem;
      margin-top: 1.8rem;
      font-size: .82rem;
      color: var(--muted);
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 6px #22c55e;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: .6; transform: scale(.85); }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="avatar">🤖</div>

    <h1 class="name">テスト太郎</h1>
    <div style="text-align:center">
      <span class="badge">AI エンジニア</span>
    </div>

    <div class="divider"></div>

    <p class="bio">
      機械学習・深層学習の研究開発から本番環境へのデプロイまで、<br>
      AIシステムのフルサイクルを手がけるエンジニアです。<br>
      人と技術をつなぐプロダクトづくりが得意です。
    </p>

    <div class="skills">
      <span class="skill">Python</span>
      <span class="skill">PyTorch</span>
      <span class="skill">LLM</span>
      <span class="skill">RAG</span>
      <span class="skill">MLOps</span>
      <span class="skill">FastAPI</span>
      <span class="skill">Docker</span>
      <span class="skill">AWS</span>
    </div>

    <div class="links">
      <a href="#" class="link-btn primary">お問い合わせ</a>
      <a href="#" class="link-btn secondary">GitHub</a>
    </div>

    <div class="status">
      <span class="dot"></span>
      現在 オープンソース活動中
    </div>
  </div>
</body>
</html>
